name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - name: Install
        run: npm ci
      - name: SEO meta audit
        run: npm run seo:audit
      - name: Upload SEO meta audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-meta-audit
          retention-days: 14
          path: reports/seo-meta-audit.md
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:unit
      - name: Production build
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E smoke
        env:
          CI: "true"
        run: npm run test:e2e
      - name: Production dependency audit
        run: npm run audit:production
      - name: Strip dev-only files for artifacts
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: DEPLOY_CLEANUP=1 npm run cleanup
      - name: Upload production artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: minrosh-production
          retention-days: 14
          path: |
            .next/standalone
            ecosystem.config.js
            data
            storage
            public
            package.json
            package-lock.json
            next.config.mjs
            middleware.js
